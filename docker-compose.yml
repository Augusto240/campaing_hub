services:
  postgres:
    image: postgres:15-alpine
    container_name: campaign-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: campaign_user
      POSTGRES_PASSWORD: campaign_pass
      POSTGRES_DB: campaign_hub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campaign-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_user -d campaign_hub"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: campaign-hub-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - campaign-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campaign-hub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://campaign_user:campaign_pass@postgres:5432/campaign_hub
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:8081
      FRONTEND_URL: http://localhost:8081
      PORT: 3000
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - campaign-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campaign-hub-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - campaign-network

  prometheus:
    image: prom/prometheus:latest
    container_name: campaign-hub-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - backend
    networks:
      - campaign-network

  grafana:
    image: grafana/grafana:latest
    container_name: campaign-hub-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: rpgmaster
    depends_on:
      - prometheus
    networks:
      - campaign-network

volumes:
  postgres_data:
  redis_data:

networks:
  campaign-network:
    driver: bridge
